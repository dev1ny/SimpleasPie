<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商超利润计算器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>商超利润计算器</h1>
            <p class="subtitle">供货商与商超合作利润分析工具</p>
        </header>

        <!-- Global Settings -->
        <div class="card global-settings">
            <div class="settings-row">
                <div class="setting-group">
                    <span class="setting-label">计税模式</span>
                    <div class="btn-group" id="taxModeGroup">
                        <button class="btn-mode active" data-mode="exclusive">不含税</button>
                        <button class="btn-mode" data-mode="inclusive">含税</button>
                    </div>
                </div>
                <div class="setting-group">
                    <span class="setting-label">税率</span>
                    <div class="input-wrap compact">
                        <input type="number" id="globalTaxRate" value="13" step="0.01">
                        <span class="unit">%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Products Container -->
        <div id="productsContainer"></div>

        <!-- Add Product -->
        <button class="btn-add-product" id="addProductBtn">+ 添加商品</button>

        <!-- Summary Panel -->
        <div class="card summary-panel" id="summaryPanel">
            <div class="section-header summary-header">
                <h2>汇总</h2>
            </div>
            <div class="summary-grid">
                <div class="summary-section my-summary">
                    <h3>我方汇总</h3>
                    <div class="summary-rows">
                        <div class="summary-row"><span class="summary-label">总成本</span><span class="summary-value" id="sTotalCost">0.00</span><span class="summary-unit">¥</span></div>
                        <div class="summary-row"><span class="summary-label">总供价</span><span class="summary-value" id="sTotalSupply">0.00</span><span class="summary-unit">¥</span></div>
                        <div class="summary-row"><span class="summary-label">总费用</span><span class="summary-value" id="sTotalFees">0.00</span><span class="summary-unit">¥</span></div>
                        <div class="summary-row"><span class="summary-label">总税额</span><span class="summary-value" id="sTotalTax">0.00</span><span class="summary-unit">¥</span></div>
                        <div class="summary-row highlight"><span class="summary-label">总利润</span><input type="number" class="summary-input" id="sTotalProfit" step="0.01" placeholder="0.00"><span class="summary-unit">¥</span></div>
                        <div class="summary-row highlight"><span class="summary-label">总利润率</span><input type="number" class="summary-input" id="sTotalMargin" step="0.01" placeholder="0.00"><span class="summary-unit">%</span></div>
                    </div>
                </div>
                <div class="summary-section partner-summary">
                    <h3>对方汇总</h3>
                    <div class="summary-rows">
                        <div class="summary-row"><span class="summary-label">总前台毛利</span><span class="summary-value" id="sTotalFrontGP">0.00</span><span class="summary-unit">¥</span></div>
                        <div class="summary-row"><span class="summary-label">总后台毛利</span><span class="summary-value" id="sTotalBackGP">0.00</span><span class="summary-unit">¥</span></div>
                        <div class="summary-row highlight"><span class="summary-label">总综合毛利</span><input type="number" class="summary-input" id="sTotalCompGP" step="0.01" placeholder="0.00"><span class="summary-unit">¥</span></div>
                        <div class="summary-row highlight"><span class="summary-label">综合利润率</span><input type="number" class="summary-input" id="sTotalCompMargin" step="0.01" placeholder="0.00"><span class="summary-unit">%</span></div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="app-footer">
            <button class="btn-reset" id="resetBtn">清除所有</button>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
